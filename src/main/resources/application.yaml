spring:
  application:
    name: platform

  datasource:
      url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5440}/${DB_NAME:platform_db}
      username: ${DB_USERNAME:platform_user}
      password: ${DB_PASSWORD:platform123}
      driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false

  flyway:
    enabled: false

  mongodb:
    host: ${MONGO_HOST:localhost}
    port: ${MONGO_PORT:27017}
    database: ${MONGO_DB:platform_mongo}
    auto-index-creation: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 2s

  cache:
    type: redis

  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 15MB

server:
  port: ${SERVER_PORT:8081}

ocr:
  tessdata-path: ${OCR_TESSDATA_PATH:src/main/resources/testdata}
  language: ${OCR_LANGUAGE:fas}

mongock:
  enabled: false

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
  api-docs:
    path: /v3/api-docs
    enabled: true

logging:
  level:
    com.example.platform: DEBUG