<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<title>تست‌کننده‌ی endpointهای platform</title>
<style>
  :root {
    --bg: #0f172a; --panel: #1e293b; --border: #334155; --text: #e2e8f0;
    --muted: #94a3b8; --accent: #38bdf8; --get: #22c55e; --post: #f59e0b;
    --put: #a78bfa; --delete: #ef4444; --ok: #22c55e; --err: #ef4444;
  }
  * { box-sizing: border-box; }
  body {
    font-family: Tahoma, Vazirmatn, sans-serif;
    background: var(--bg); color: var(--text); margin: 0; padding: 24px;
  }
  h1 { font-size: 20px; margin-bottom: 4px; }
  .sub { color: var(--muted); font-size: 13px; margin-bottom: 20px; }
  .base-url {
    display: flex; gap: 8px; align-items: center; margin-bottom: 24px;
    background: var(--panel); padding: 12px 16px; border-radius: 12px; border: 1px solid var(--border);
  }
  .base-url input {
    flex: 1; background: #0b1220; border: 1px solid var(--border); color: var(--text);
    padding: 8px 10px; border-radius: 8px; font-family: monospace; direction: ltr; text-align: left;
  }
  .group { margin-bottom: 28px; }
  .group h2 {
    font-size: 15px; color: var(--accent); border-bottom: 1px solid var(--border);
    padding-bottom: 6px; margin-bottom: 10px;
  }
  .row {
    background: var(--panel); border: 1px solid var(--border); border-radius: 12px;
    padding: 12px 14px; margin-bottom: 10px;
  }
  .row-top { display: flex; gap: 10px; align-items: center; }
  .method {
    font-size: 11px; font-weight: bold; padding: 3px 8px; border-radius: 6px;
    color: #0b1220; min-width: 52px; text-align: center; font-family: monospace;
  }
  .method.GET { background: var(--get); }
  .method.POST { background: var(--post); }
  .method.PUT { background: var(--put); }
  .method.DELETE { background: var(--delete); }
  .url-input {
    flex: 1; background: #0b1220; border: 1px solid var(--border); color: var(--text);
    padding: 6px 10px; border-radius: 8px; font-family: monospace; font-size: 13px;
    direction: ltr; text-align: left;
  }
  .send-btn {
    background: var(--accent); color: #0b1220; border: none; padding: 6px 16px;
    border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 13px;
  }
  .send-btn:hover { opacity: 0.85; }
  .note { color: var(--muted); font-size: 12px; margin-top: 6px; }
  textarea.body-input {
    width: 100%; margin-top: 8px; background: #0b1220; border: 1px solid var(--border);
    color: var(--text); padding: 8px; border-radius: 8px; font-family: monospace;
    font-size: 12px; direction: ltr; text-align: left; min-height: 60px; resize: vertical;
  }
  .result {
    margin-top: 8px; padding: 10px; border-radius: 8px; font-family: monospace;
    font-size: 12px; white-space: pre-wrap; word-break: break-all; direction: ltr; text-align: left;
    max-height: 260px; overflow: auto; display: none;
  }
  .result.show { display: block; }
  .result.ok { background: rgba(34,197,94,0.1); border: 1px solid var(--ok); }
  .result.err { background: rgba(239,68,68,0.1); border: 1px solid var(--err); }
  .status-badge { font-weight: bold; margin-left: 8px; }
  .warn-badge {
    background: rgba(239,68,68,0.15); color: #fca5a5; border: 1px solid var(--delete);
    font-size: 11px; padding: 2px 6px; border-radius: 6px; margin-right: 6px;
  }
</style>
</head>
<body>

<h1>🧪 تست‌کننده‌ی endpointهای Platform</h1>
<p class="sub">
  همه‌ی endpointهای پیاده‌سازی‌شده تا این مرحله، با مقادیر پیش‌فرض آماده. هر URL/بدنه رو می‌تونی قبل از ارسال ویرایش کنی.
  این صفحه رو مستقیم با دابل‌کلیک باز کن (نیازی به سرور نیست)، فقط باید بک‌اند روشن باشه.
</p>

<div class="base-url">
  <label>Base URL:</label>
  <input id="baseUrl" value="http://localhost:8080" />
</div>

<div id="app"></div>

<script>
const endpoints = [
  { group: "چت (Orchestration)", items: [
    { method: "POST", url: "/api/chat", body: {"question": "قیمت دوره جاوا چقدره؟", "userId": "test-user"} },
    { method: "POST", url: "/api/chat", body: {"question": "چطور می‌تونم ثبت‌نام کنم؟"} , note: "این باید از qa_pairs جواب بده (matchedQaId پر میشه)" },
  ]},
  { group: "تاریخچه مکالمه (Mongo) - بدون پوشش ApiResponse", items: [
    { method: "POST", url: "/api/chat-sessions", body: {"userId": "test-user"} },
    { method: "POST", url: "/api/chat-sessions/REPLACE_SESSION_ID/messages", body: {"role": "user", "content": "سلام"}, note: "SESSION_ID رو از جواب endpoint بالا بگیر و توی URL جایگزین کن" },
    { method: "GET", url: "/api/chat-sessions/REPLACE_SESSION_ID/history", note: "همینطور" },
  ]},
  { group: "دوره‌ها", items: [
    { method: "GET", url: "/api/courses/all" },
    { method: "GET", url: "/api/courses?page=0&size=12&sort=id,desc" },
    { method: "GET", url: "/api/courses/1" },
    { method: "GET", url: "/api/courses/by-name?name=Java" },
    { method: "GET", url: "/api/courses/1/details" },
    { method: "GET", url: "/api/courses/details/search?page=0&size=12" },
  ]},
  { group: "مسیرهای شغلی", items: [
    { method: "GET", url: "/api/careers/all" },
    { method: "GET", url: "/api/careers?page=0&size=12" },
    { method: "GET", url: "/api/careers/1" },
    { method: "POST", url: "/api/careers", body: {"title": "تست مسیر شغلی", "description": "یه توضیح تستی", "sourceUrl": null} },
    { method: "PUT", url: "/api/careers/1", body: {"title": "توسعه‌دهنده بک‌اند (ویرایش‌شده)", "description": "...", "sourceUrl": null}, warn: true },
    { method: "DELETE", url: "/api/careers/9999", warn: true, note: "عمداً یه id که وجود نداره؛ اگه می‌خوای واقعاً حذف کنی، id رو عوض کن" },
    { method: "GET", url: "/api/careers/1/skills" },
    { method: "POST", url: "/api/careers/1/skills", body: {"skillName": "تست مهارت"} },
    { method: "GET", url: "/api/careers/1/requirements" },
    { method: "POST", url: "/api/careers/1/requirements", body: {"chunkIndex": 99, "requirementText": "یه نیازمندی تستی", "embedding": null} },
    { method: "POST", url: "/api/careers/search", body: {"embedding": Array(384).fill(0.01), "topK": 5, "minSimilarity": 0.1}, note: "بردار تصادفیه فقط برای تست فراخوانی، نتیجه‌ی معنادار نمی‌ده" },
    { method: "GET", url: "/api/courses/1/careers" },
    { method: "POST", url: "/api/courses/1/careers", body: {"careerId": 2, "relevance": 0.7} },
    { method: "GET", url: "/api/careers/1/courses" },
  ]},
  { group: "بانک سوال-جواب (فقط خواندنی)", items: [
    { method: "GET", url: "/api/qa/all" },
    { method: "GET", url: "/api/qa?keyword=جاوا" },
    { method: "GET", url: "/api/qa/1" },
    { method: "GET", url: "/api/qa/1/detail" },
    { method: "GET", url: "/api/qa/by-course/1" },
    { method: "GET", url: "/api/qa/by-intent?name=faq" },
    { method: "GET", url: "/api/qa/count" },
    { method: "GET", url: "/api/qa/exists?question=قیمت دوره جاوا چقدره؟" },
    { method: "GET", url: "/api/qa-embeddings/all" },
    { method: "GET", url: "/api/qa-embeddings/1" },
    { method: "GET", url: "/api/qa-embeddings/by-qa/1" },
    { method: "GET", url: "/api/qa-embeddings/by-model?modelName=fake-bow-v1" },
    { method: "GET", url: "/api/qa-intents/all" },
    { method: "GET", url: "/api/qa-intents/by-qa/1" },
    { method: "GET", url: "/api/intents/all" },
    { method: "GET", url: "/api/intents/1" },
    { method: "GET", url: "/api/intents/by-name?name=faq" },
  ]},
  { group: "لاگ تحلیلی و فیدبک", items: [
    { method: "GET", url: "/api/chat-logs?page=0&size=10" },
    { method: "GET", url: "/api/chat-logs/1" },
    { method: "GET", url: "/api/chat-logs/session/REPLACE_SESSION_ID" },
    { method: "POST", url: "/api/feedback", body: {"logId": 1, "rating": 1, "comment": "تست فیدبک"} },
    { method: "GET", url: "/api/feedback/log/1" },
  ]},
  { group: "کش", items: [
    { method: "GET", url: "/api/cache/top-queries?limit=10" },
    { method: "DELETE", url: "/api/cache/flush", warn: true },
  ]},
];

const app = document.getElementById("app");
const baseUrlInput = document.getElementById("baseUrl");

endpoints.forEach((group, gi) => {
  const groupEl = document.createElement("div");
  groupEl.className = "group";
  groupEl.innerHTML = `<h2>${group.group}</h2>`;

  group.items.forEach((ep, ei) => {
    const rowId = `row-${gi}-${ei}`;
    const row = document.createElement("div");
    row.className = "row";

    const hasBody = ep.body !== undefined;
    const bodyJson = hasBody ? JSON.stringify(ep.body, null, 2) : "";

    row.innerHTML = `
      <div class="row-top">
        <span class="method ${ep.method}">${ep.method}</span>
        ${ep.warn ? '<span class="warn-badge">⚠️ تغییر/حذف داده</span>' : ''}
        <input class="url-input" id="${rowId}-url" value="${ep.url}" />
        <button class="send-btn" id="${rowId}-btn">ارسال</button>
      </div>
      ${ep.note ? `<div class="note">${ep.note}</div>` : ''}
      ${hasBody ? `<textarea class="body-input" id="${rowId}-body">${bodyJson}</textarea>` : ''}
      <div class="result" id="${rowId}-result"></div>
    `;
    groupEl.appendChild(row);

    row.querySelector(`#${rowId}-btn`).addEventListener("click", async () => {
      const url = row.querySelector(`#${rowId}-url`).value;
      const resultEl = row.querySelector(`#${rowId}-result`);
      const base = baseUrlInput.value.replace(/\/$/, "");
      resultEl.className = "result show";
      resultEl.textContent = "در حال ارسال...";

      const options = { method: ep.method, headers: {} };
      if (hasBody) {
        options.headers["Content-Type"] = "application/json";
        try {
          options.body = row.querySelector(`#${rowId}-body`).value;
        } catch (e) {
          resultEl.className = "result show err";
          resultEl.textContent = "بدنه‌ی JSON نامعتبره: " + e.message;
          return;
        }
      }

      try {
        const start = performance.now();
        const res = await fetch(base + url, options);
        const elapsed = Math.round(performance.now() - start);
        let bodyText;
        try {
          const json = await res.json();
          bodyText = JSON.stringify(json, null, 2);
        } catch {
          bodyText = "(بدون بدنه یا JSON نامعتبر)";
        }
        resultEl.className = "result show " + (res.ok ? "ok" : "err");
        resultEl.textContent = `HTTP ${res.status} ${res.statusText}  (${elapsed}ms)\n\n${bodyText}`;
      } catch (e) {
        resultEl.className = "result show err";
        resultEl.textContent = "خطای شبکه/CORS: " + e.message +
          "\n\nاحتمالاً بک‌اند روشن نیست، یا Base URL اشتباهه، یا پروفایل local/dev فعال نیست (CORS فقط روی این دو پروفایل بازه).";
      }
    });
  });

  app.appendChild(groupEl);
});
</script>
</body>
</html>
